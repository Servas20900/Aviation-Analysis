version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: aviation_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Admin1234!
      MYSQL_DATABASE: aviation_db
      MYSQL_USER: sebastian
      MYSQL_PASSWORD: Sebastian1234!
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data: